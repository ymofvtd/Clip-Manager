name: Build and Release

on:
  push:
    tags:
      - 'v*'           # Push a tag like v1.0.2 to trigger a release
  workflow_dispatch:   # Also allow manual trigger from GitHub Actions tab
    inputs:
      version:
        description: 'Version number (without the v, e.g. 1.0.2)'
        required: false
        type: string

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine release version
        id: get-version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.version }}' -ne '') {
            $ver = '${{ inputs.version }}'
          } else {
            # Strip leading 'v' from tag (v1.0.2 -> 1.0.2)
            $ver = '${{ github.ref_name }}' -replace '^v', ''
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Using version: $ver"

      - name: Restore NuGet packages
        run: dotnet restore VideoTrayApp/VideoTrayApp.csproj

      - name: Publish single-file Release EXE
        run: |
          dotnet publish VideoTrayApp/VideoTrayApp.csproj `
            -c Release `
            -p:Version=${{ steps.get-version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.get-version.outputs.version }}.0 `
            -p:FileVersion=${{ steps.get-version.outputs.version }}.0 `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output ./artifacts

      - name: Rename exe with version and clean up
        shell: pwsh
        run: |
          $ver = '${{ steps.get-version.outputs.version }}'
          $source = 'artifacts/VideoTrayApp.exe'
          $target = "artifacts/VideoTrayApp-$ver.exe"
          
          if (Test-Path $source) {
            Move-Item -Path $source -Destination $target -Force
            Write-Host "Created: $target"
          }
          
          # Remove .pdb debug symbols (not needed for end users)
          Get-ChildItem artifacts -Filter *.pdb | Remove-Item -Force

      - name: Upload build artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: VideoTrayApp-${{ steps.get-version.outputs.version }}
          path: artifacts/VideoTrayApp-*.exe
          retention-days: 30

      - name: Create GitHub Release + attach EXE
        # Only create the actual GitHub Release when triggered by a tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VideoTrayApp v${{ steps.get-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/VideoTrayApp-${{ steps.get-version.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
