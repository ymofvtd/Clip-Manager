name: Build and Release

on:
  push:
    tags:
      - 'v*'           # Push a tag like v1.0.5 to trigger a release
    branches:
      - main
    paths:
      - 'VideoTrayApp/**'
      - '.github/workflows/**'
  workflow_dispatch:   # Also allow manual trigger from GitHub Actions tab
    inputs:
      version:
        description: 'Version number (without the v, e.g. 1.0.2)'
        required: false
        type: string

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write   # Required to create releases and upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Compare against previous commit for version-bump detection

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine release version
        id: get-version
        shell: pwsh
        run: |
          function Get-CsprojVersion {
            $csproj = Get-Content 'VideoTrayApp/VideoTrayApp.csproj' -Raw
            if ($csproj -match '<Version>([^<]+)</Version>') {
              return $Matches[1].Trim()
            }
            Write-Error 'No <Version> found in VideoTrayApp/VideoTrayApp.csproj'
            exit 1
          }

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            if ('${{ inputs.version }}' -ne '') {
              $fullVer = '${{ inputs.version }}'
            } else {
              $fullVer = Get-CsprojVersion
            }
          } elseif ('${{ github.ref }}' -like 'refs/tags/*') {
            # Tag push: strip leading 'v' (v1.0.2 -> 1.0.2)
            $fullVer = '${{ github.ref_name }}' -replace '^v', ''
          } else {
            # main branch push: use version from .csproj
            $fullVer = Get-CsprojVersion
          }

          # For AssemblyVersion and FileVersion we MUST use a numeric version (major.minor.build.revision)
          # Strip any pre-release suffix (everything after - or +)
          $base = $fullVer -replace '[-+].*$', ''
          if ($base -notmatch '^\d') {
            $base = '1.0.0'
          }

          # Ensure we have at least 3 parts (major.minor.build)
          $parts = $base.Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $cleanVersion = ($parts[0..2] -join '.') + '.0'   # e.g. "1.0.2.0"

          echo "version=$fullVer" >> $env:GITHUB_OUTPUT
          echo "cleanVersion=$cleanVersion" >> $env:GITHUB_OUTPUT
          echo "displayVersion=$base" >> $env:GITHUB_OUTPUT
          echo "Using version: $fullVer (assembly: $cleanVersion, release: $base)"

      - name: Detect version bump on main
        id: version-bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $changed = 'false'
          try {
            $prev = git show HEAD~1:VideoTrayApp/VideoTrayApp.csproj
            $curr = Get-Content 'VideoTrayApp/VideoTrayApp.csproj' -Raw
            $prevVer = if ($prev -match '<Version>([^<]+)</Version>') { $Matches[1].Trim() } else { '' }
            $currVer = if ($curr -match '<Version>([^<]+)</Version>') { $Matches[1].Trim() } else { '' }
            if ($prevVer -ne $currVer -and $currVer -ne '') {
              $changed = 'true'
              Write-Host "Version bumped: $prevVer -> $currVer"
            } else {
              Write-Host "Version unchanged ($currVer); build only, no release"
            }
          } catch {
            Write-Host "Could not compare previous commit; skipping auto-release"
          }
          echo "changed=$changed" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        run: dotnet restore VideoTrayApp/VideoTrayApp.csproj

      - name: Publish single-file Release EXE
        run: |
          dotnet publish VideoTrayApp/VideoTrayApp.csproj `
            -c Release `
            -p:Version=${{ steps.get-version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.get-version.outputs.cleanVersion }} `
            -p:FileVersion=${{ steps.get-version.outputs.cleanVersion }} `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output ./artifacts

      - name: Rename exe with version and clean up
        shell: pwsh
        run: |
          $ver = '${{ steps.get-version.outputs.version }}'
          $source = 'artifacts/VideoTrayApp.exe'
          $target = "artifacts/VideoTrayApp-$ver.exe"
          
          if (Test-Path $source) {
            Move-Item -Path $source -Destination $target -Force
            Write-Host "Created: $target"
          }
          
          # Remove .pdb debug symbols (not needed for end users)
          Get-ChildItem artifacts -Filter *.pdb | Remove-Item -Force

      - name: Upload build artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: VideoTrayApp-${{ steps.get-version.outputs.displayVersion }}
          path: artifacts/VideoTrayApp-*.exe
          retention-days: 30

      - name: Create GitHub Release + attach EXE
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          github.event_name == 'workflow_dispatch' ||
          steps.version-bump.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.get-version.outputs.displayVersion }}
          target_commitish: ${{ github.sha }}
          name: VideoTrayApp v${{ steps.get-version.outputs.displayVersion }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Official release **VideoTrayApp v${{ steps.get-version.outputs.displayVersion }}**

            Download `VideoTrayApp-${{ steps.get-version.outputs.version }}.exe` below and run it on Windows 10/11 (x64). No .NET runtime install required.
          files: |
            artifacts/VideoTrayApp-${{ steps.get-version.outputs.version }}.exe