name: Build and Release

on:
  push:
    tags:
      - 'v*'           # Push a tag like v1.0.5 to trigger a release
    branches:
      - main
    # NOTE: Do not add a paths: filter here. It also applies to tag pushes, and
    # tag-only pushes (commit already on remote) produce an empty path diff so
    # GitHub skips the workflow entirely — which is how v2.0.1 failed to release.
  workflow_dispatch:   # Also allow manual trigger from GitHub Actions tab
    inputs:
      version:
        description: 'Version number (without the v, e.g. 1.0.2)'
        required: false
        type: string

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write   # Required to create releases and upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so we can compare versions against github.event.before
          # (multi-commit pushes) and HEAD~1 reliably.
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine release version
        id: get-version
        shell: pwsh
        run: |
          function Get-CsprojVersionFromText {
            param([string]$Text)
            # Must match against a single string so $Matches capture groups work.
            # (PowerShell -match on string[] filters lines and does NOT set $Matches.)
            if ([string]::IsNullOrEmpty($Text)) { return '' }
            if ($Text -match '<Version>([^<]+)</Version>') {
              return $Matches[1].Trim()
            }
            return ''
          }

          function Get-CsprojVersion {
            $csproj = Get-Content 'VideoTrayApp/VideoTrayApp.csproj' -Raw
            $ver = Get-CsprojVersionFromText $csproj
            if (-not $ver) {
              Write-Error 'No <Version> found in VideoTrayApp/VideoTrayApp.csproj'
              exit 1
            }
            return $ver
          }

          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            if ('${{ inputs.version }}' -ne '') {
              $fullVer = '${{ inputs.version }}'
            } else {
              $fullVer = Get-CsprojVersion
            }
          } elseif ('${{ github.ref }}' -like 'refs/tags/*') {
            # Tag push: strip leading 'v' (v1.0.2 -> 1.0.2)
            $fullVer = '${{ github.ref_name }}' -replace '^v', ''
          } else {
            # main branch push: use version from .csproj
            $fullVer = Get-CsprojVersion
          }

          # For AssemblyVersion and FileVersion we MUST use a numeric version (major.minor.build.revision)
          # Strip any pre-release suffix (everything after - or +)
          $base = $fullVer -replace '[-+].*$', ''
          if ($base -notmatch '^\d') {
            $base = '1.0.0'
          }

          # Ensure we have at least 3 parts (major.minor.build)
          $parts = $base.Split('.')
          while ($parts.Count -lt 3) { $parts += '0' }
          $cleanVersion = ($parts[0..2] -join '.') + '.0'   # e.g. "1.0.2.0"

          "version=$fullVer" >> $env:GITHUB_OUTPUT
          "cleanVersion=$cleanVersion" >> $env:GITHUB_OUTPUT
          "displayVersion=$base" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $fullVer (assembly: $cleanVersion, release: $base)"

      - name: Detect version bump on main
        id: version-bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          function Get-CsprojVersionFromText {
            param([string]$Text)
            if ([string]::IsNullOrEmpty($Text)) { return '' }
            if ($Text -match '<Version>([^<]+)</Version>') {
              return $Matches[1].Trim()
            }
            return ''
          }

          $changed = 'false'
          try {
            $currText = Get-Content 'VideoTrayApp/VideoTrayApp.csproj' -Raw
            $currVer = Get-CsprojVersionFromText $currText

            # Prefer the SHA before this push (handles multi-commit pushes).
            # Fall back to HEAD~1 when before is missing (e.g. first commit).
            $before = '${{ github.event.before }}'
            $prevText = $null
            if ($before -and $before -ne '0000000000000000000000000000000000000000') {
              $prevText = git show "${before}:VideoTrayApp/VideoTrayApp.csproj" 2>$null | Out-String
            }
            if (-not $prevText) {
              $prevText = git show 'HEAD~1:VideoTrayApp/VideoTrayApp.csproj' 2>$null | Out-String
            }

            $prevVer = Get-CsprojVersionFromText $prevText

            if ($currVer -and $prevVer -ne $currVer) {
              $changed = 'true'
              Write-Host "Version bumped: $prevVer -> $currVer"
            } else {
              Write-Host "Version unchanged (prev='$prevVer', curr='$currVer'); build only, no release"
            }
          } catch {
            Write-Host "Could not compare previous commit; skipping auto-release: $($_.Exception.Message)"
          }
          "changed=$changed" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        run: dotnet restore VideoTrayApp/VideoTrayApp.csproj

      - name: Publish single-file Release EXE
        run: |
          dotnet publish VideoTrayApp/VideoTrayApp.csproj `
            -c Release `
            -p:Version=${{ steps.get-version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.get-version.outputs.cleanVersion }} `
            -p:FileVersion=${{ steps.get-version.outputs.cleanVersion }} `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output ./artifacts

      - name: Rename exe with version and clean up
        shell: pwsh
        run: |
          $ver = '${{ steps.get-version.outputs.version }}'
          $source = 'artifacts/ClipsManager.exe'
          $target = "artifacts/ClipsManager-$ver.exe"

          if (Test-Path $source) {
            Move-Item -Path $source -Destination $target -Force
            Write-Host "Created: $target"
          } else {
            Write-Error "Expected publish output not found: $source"
            Get-ChildItem artifacts -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          # Remove .pdb debug symbols (not needed for end users)
          Get-ChildItem artifacts -Filter *.pdb | Remove-Item -Force

      - name: Upload build artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: ClipsManager-${{ steps.get-version.outputs.displayVersion }}
          path: artifacts/ClipsManager-*.exe
          retention-days: 30

      # Create as draft first, upload the .exe, THEN publish. That avoids a race where
      # /releases/latest exists with zero assets and the in-app updater reports
      # "No downloadable .exe was found in the latest release".
      - name: Create draft GitHub Release + attach EXE
        id: make-release
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          github.event_name == 'workflow_dispatch' ||
          steps.version-bump.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.get-version.outputs.displayVersion }}
          target_commitish: ${{ github.sha }}
          name: Clips Manager v${{ steps.get-version.outputs.displayVersion }}
          draft: true
          prerelease: ${{ contains(steps.get-version.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            Official release **Clips Manager v${{ steps.get-version.outputs.displayVersion }}**

            Download `ClipsManager-${{ steps.get-version.outputs.version }}.exe` below and run it on Windows 10/11 (x64). No .NET runtime install required.
          files: |
            artifacts/ClipsManager-${{ steps.get-version.outputs.version }}.exe

      - name: Publish release (assets already attached)
        if: |
          (startsWith(github.ref, 'refs/tags/') ||
           github.event_name == 'workflow_dispatch' ||
           steps.version-bump.outputs.changed == 'true')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = 'v${{ steps.get-version.outputs.displayVersion }}'
          # Confirm the exe is on the draft before making it latest.
          $assets = gh release view $tag --json assets --jq '.assets[].name'
          Write-Host "Release $tag assets:`n$assets"
          if ($assets -notmatch '\.exe') {
            Write-Error "Refusing to publish $tag: no .exe asset attached."
            exit 1
          }
          gh release edit $tag --draft=false
          Write-Host "Published $tag"
